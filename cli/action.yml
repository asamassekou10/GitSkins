name: 'GitSkins'
description: 'Render themed GitHub profile widgets to committed files so your README never hot-links gitskins.com.'
author: 'gitskins'

branding:
  icon: 'image'
  color: 'purple'

inputs:
  version:
    description: 'Version of the gitskins npm package to run (e.g. 0.1.0, or "latest").'
    required: false
    default: 'latest'
  strict:
    description: 'Fail the job if any widget fails, even when a cached copy is kept.'
    required: false
    default: 'false'
  base_url:
    description: 'GitSkins instance to render from.'
    required: false
    default: ''
  commit_message:
    description: 'Commit message for the auto-commit.'
    required: false
    default: 'chore(gitskins): refresh profile widgets'
  auto_commit:
    description: 'Whether to auto-commit and push refreshed widgets.'
    required: false
    default: 'true'

outputs:
  changed:
    description: 'Whether any widget file changed (true/false).'
    value: ${{ steps.commit.outputs.changed }}

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Render widgets
      shell: bash
      run: |
        npx --yes gitskins@${{ inputs.version }} render \
          ${{ inputs.strict == 'true' && '--strict' || '' }} \
          ${{ inputs.base_url != '' && format('--base-url "{0}"', inputs.base_url) || '' }}

    - name: Commit and push changes
      id: commit
      if: inputs.auto_commit == 'true'
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

        # Stage everything the CLI may have written (the output dir lives in the config).
        git add -A

        if git diff --cached --quiet; then
          echo "No widget changes."
          echo "changed=false" >> "$GITHUB_OUTPUT"
        else
          git commit -m "${{ inputs.commit_message }}"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"
        fi
